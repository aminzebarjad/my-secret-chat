<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت روم رمزدار | Icloner (با لاگ‌یاب)</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0d1117; margin: 0; padding: 20px; color: #c9d1d9; }
        .chat-container { max-width: 800px; margin: 0 auto; background: #161b22; border-radius: 16px; overflow: hidden; }
        .chat-header { background: #1f6eeb; padding: 16px; text-align: center; font-weight: bold; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 16px; background: #0d1117; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
        .message-user { background: #1f6eeb; align-self: flex-end; color: white; }
        .message-other { background: #2d333b; align-self: flex-start; }
        .message-time { font-size: 0.7rem; color: #8b949e; margin-top: 4px; }
        .chat-input-area { padding: 16px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 10px; flex-wrap: wrap; }
        .chat-input-area input { flex: 1; padding: 12px; border-radius: 24px; border: 1px solid #30363d; background: #0d1117; color: white; }
        .chat-input-area button { background: #1f6eeb; border: none; padding: 12px 24px; border-radius: 24px; color: white; cursor: pointer; }
        .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .lock-box { background: #161b22; padding: 32px; border-radius: 16px; text-align: center; }
        .lock-box input { padding: 12px; margin-top: 16px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; width: 200px; }
        .error { color: #f85149; margin-top: 12px; }
        .status { text-align: center; font-size: 0.8rem; color: #8b949e; }
        .token-box { background: #2d333b; padding: 12px; border-radius: 8px; margin-top: 10px; font-family: monospace; word-break: break-all; display: none; }
        .copy-btn { background: #238636; border: none; padding: 6px 12px; border-radius: 6px; color: white; cursor: pointer; margin-top: 8px; }

        /* پنل لاگ حرفه‌ای */
        .log-panel {
            margin-top: 20px;
            background: #0a0c10;
            border-radius: 12px;
            border: 1px solid #30363d;
            overflow: hidden;
        }
        .log-header {
            background: #1f242e;
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            user-select: none;
        }
        .log-header:hover { background: #2d333b; }
        .log-content {
            max-height: 300px;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            background: #0d1117;
            border-top: 1px solid #30363d;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .log-entry {
            border-bottom: 1px solid #2d333b;
            padding: 6px 0;
            color: #c9d1d9;
            word-break: break-word;
        }
        .log-time { color: #8b949e; font-size: 10px; margin-right: 8px; }
        .log-error { color: #f85149; }
        .log-success { color: #3fb950; }
        .log-warn { color: #d29922; }
        .log-info { color: #58a6ff; }
        .copy-log-btn {
            background: #238636;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
    <div class="lock-box">
        <h2>🔐 چت روم رمزدار</h2>
        <p>رمز را وارد کنید</p>
        <input type="password" id="passwordInput" placeholder="رمز">
        <div><button onclick="checkPassword()" style="margin-top:16px; background:#1f6eeb; border:none; padding:10px 24px; border-radius:24px; color:white; cursor:pointer;">ورود</button></div>
        <div id="lockError" class="error"></div>
    </div>
</div>

<div id="chatApp" style="display:none;">
    <div class="chat-container">
        <div class="chat-header">💬 چت روم رمزدار | Icloner</div>
        <div class="chat-messages" id="messages"><div class="status">در حال بارگذاری...</div></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="پیام خود را بنویسید...">
            <button onclick="sendMessage()">📤 ارسال</button>
            <button onclick="requestAutoToken()" style="background:#2d333b;">🔑 دریافت توکن خودکار</button>
        </div>
        <div id="tokenDisplay" class="token-box"></div>
    </div>

    <!-- پنل لاگ‌یاب -->
    <div class="log-panel">
        <div class="log-header" onclick="toggleLog()">
            <span>📋 نمایش لاگ عملیات (برای عیب‌یابی) ▼</span>
            <button class="copy-log-btn" onclick="copyLog(event)">📋 کپی لاگ</button>
        </div>
        <div id="logContent" class="log-content"></div>
    </div>
</div>

<script>
    // ---------- تنظیمات (مقادیر از Secrets در زمان build جایگزین می‌شوند) ----------
    const REPO_OWNER = "aminzebarjad";
    const REPO_NAME = "my-secret-chat";
    const ISSUE_NUMBER = 1;
    const SECRET_PASSWORD = "1234";
    const ADMIN_TOKEN = "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";
    // ------------------------------------------------------------

    let userToken = "";
    let currentSessionId = "";
    let logEntries = [];

    // تابع لاگ کردن
    function addLog(message, type = "info") {
        const time = new Date().toLocaleTimeString('fa-IR');
        const entry = `[${time}] ${message}`;
        logEntries.push(entry);
        const logDiv = document.getElementById("logContent");
        if (logDiv) {
            const entryDiv = document.createElement("div");
            entryDiv.className = `log-entry log-${type}`;
            entryDiv.innerHTML = `<span class="log-time">${time}</span> ${message}`;
            logDiv.appendChild(entryDiv);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        console.log(entry);
    }

    function toggleLog() {
        const content = document.getElementById("logContent");
        if (content.style.display === "none" || content.style.display === "") {
            content.style.display = "flex";
        } else {
            content.style.display = "none";
        }
    }

    function copyLog(event) {
        event.stopPropagation();
        const fullLog = logEntries.join("\n");
        navigator.clipboard.writeText(fullLog).then(() => alert("لاگ کپی شد!"));
    }

    // تابع authFetch با لاگ کامل
    async function authFetch(url, options = {}) {
        addLog(`📡 ارسال درخواست به: ${url}`, "info");
        try {
            const response = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    "Authorization": `Bearer ${ADMIN_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Content-Type": "application/json"
                }
            });
            addLog(`وضعیت پاسخ: ${response.status} ${response.statusText}`, response.ok ? "success" : "error");
            if (!response.ok) {
                let errorText = "";
                try {
                    const errorJson = await response.clone().json();
                    errorText = JSON.stringify(errorJson);
                } catch(e) { errorText = await response.clone().text(); }
                addLog(`❌ خطا: ${response.status} - ${errorText}`, "error");
                throw new Error(`HTTP ${response.status}`);
            }
            return response;
        } catch(e) {
            addLog(`⚠️ استثنا در fetch: ${e.message}`, "error");
            throw e;
        }
    }

    function generateSessionId() {
        return "session_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8);
    }

    function checkPassword() {
        const pwd = document.getElementById("passwordInput").value;
        addLog(`بررسی رمز ورود (خود کاربر)`, "info");
        if (pwd === SECRET_PASSWORD) {
            addLog(`✅ رمز صحیح است`, "success");
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("chatApp").style.display = "block";
            loadMessages();
            setInterval(loadMessages, 5000);
        } else {
            addLog(`❌ رمز اشتباه: ${pwd}`, "error");
            document.getElementById("lockError").innerText = "رمز اشتباه است!";
        }
    }

    async function requestAutoToken() {
        const pwd = document.getElementById("passwordInput").value;
        addLog(`🔐 درخواست توکن خودکار با رمز ارائه شده`, "info");
        if (!pwd) {
            addLog(`❌ رمز وارد نشده`, "error");
            alert("ابتدا رمز را وارد کنید");
            return;
        }
        const sessionId = generateSessionId();
        currentSessionId = sessionId;
        addLog(`شناسه جلسه: ${sessionId}`, "info");
        
        const tokenBox = document.getElementById("tokenDisplay");
        tokenBox.style.display = "block";
        tokenBox.innerHTML = "🔄 در حال ساخت توکن... لطفاً چند ثانیه صبر کنید.";
        
        try {
            addLog(`ارسال درخواست به workflow_dispatch...`);
            const response = await authFetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/issue-token.yml/dispatches`, {
                method: "POST",
                body: JSON.stringify({
                    ref: "main",
                    inputs: {
                        password: pwd,
                        session_id: sessionId
                    }
                })
            });
            addLog(`✅ اکشن با موفقیت فراخوانی شد`, "success");
        } catch(e) {
            tokenBox.innerHTML = "❌ خطا در اجرای اکشن. رمز را بررسی کنید. لاگ را ببینید.";
            addLog(`❌ خطای ارسال به workflow: ${e.message}`, "error");
            return;
        }
        
        let attempts = 0;
        const maxAttempts = 25;
        addLog(`⏳ منتظر ظاهر شدن توکن در Issue (حداکثر ${maxAttempts*2} ثانیه)...`, "info");
        const interval = setInterval(async () => {
            attempts++;
            try {
                const commentsRes = await authFetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`);
                const comments = await commentsRes.json();
                const targetComment = comments.find(c => c.body && c.body.includes(`TOKEN_RESULT_${sessionId}`));
                if (targetComment) {
                    clearInterval(interval);
                    const token = targetComment.body.split(": ")[1];
                    userToken = token;
                    addLog(`✅ توکن دریافت شد: ${token.substring(0,15)}... (معتبر ۱ ساعت)`, "success");
                    tokenBox.innerHTML = `✅ توکن ساخته شد. کپی کنید و در صورت درخواست جایگذاری کنید.<br><code style="background:#0d1117;padding:8px;display:block;margin:8px 0;border-radius:6px;">${token}</code>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText('${token}'); alert('کپی شد');">📋 کپی توکن</button>
                    <button onclick="document.getElementById('tokenDisplay').style.display='none'">✖️ بستن</button>`;
                    return;
                }
                if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    addLog(`❌ زمان انتظار پایان یافت. توکن یافت نشد.`, "error");
                    tokenBox.innerHTML = "❌ زمان انتظار تمام شد. توکن ساخته نشد. دوباره تلاش کنید.";
                } else {
                    addLog(`تلاش ${attempts}: هنوز توکن نیامده...`, "info");
                }
            } catch(e) {
                addLog(`⚠️ خطا در بررسی کامنت‌ها: ${e.message}`, "error");
            }
        }, 2000);
    }

    async function loadMessages() {
        try {
            addLog(`بارگذاری پیام‌ها...`, "info");
            const commentsRes = await authFetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`);
            const comments = await commentsRes.json();
            const messagesDiv = document.getElementById("messages");
            if (!Array.isArray(comments) || comments.length === 0) {
                messagesDiv.innerHTML = '<div class="status">هنوز پیامی نیست...</div>';
                return;
            }
            const sorted = comments.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            messagesDiv.innerHTML = "";
            for (let comment of sorted) {
                if (comment.body.startsWith("🔑 TOKEN_RESULT_")) continue;
                let body = comment.body;
                let decrypted = body;
                if (body.startsWith("[ENC]")) {
                    try {
                        decrypted = body.substring(5).split('').map(ch => {
                            if (ch >= 'ا' && ch <= 'ی') {
                                let shifted = ch.charCodeAt(0) - 1;
                                return shifted >= 1570 ? String.fromCharCode(shifted) : 'ی';
                            }
                            return ch;
                        }).join('');
                    } catch(e) { decrypted = "⚠️ خطا در رمزگشایی"; }
                }
                const div = document.createElement("div");
                div.className = "message " + (comment.user.login === REPO_OWNER ? "message-user" : "message-other");
                div.innerHTML = `<div><strong>${comment.user.login}</strong></div><div>${decrypted}</div><div class="message-time">${new Date(comment.created_at).toLocaleTimeString('fa-IR')}</div>`;
                messagesDiv.appendChild(div);
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            addLog(`✅ ${sorted.length} پیام بارگذاری شد`, "success");
        } catch(e) {
            addLog(`❌ خطا در دریافت پیام‌ها: ${e.message}`, "error");
            document.getElementById("messages").innerHTML = '<div class="status">خطا در دریافت پیام‌ها. ممکن است توکن نامعتبر باشد.</div>';
        }
    }

    async function sendMessage() {
        const msg = document.getElementById("messageInput").value;
        if (!msg.trim()) return;
        if (!userToken) {
            const tokenInput = prompt("توکن ندارید. لطفاً ابتدا دکمه «دریافت توکن خودکار» را بزنید یا توکن خود را وارد کنید:");
            if (!tokenInput) return;
            userToken = tokenInput;
            addLog(`توکن دستی وارد شد (${userToken.substring(0,10)}...)`, "info");
        }
        let encrypted = "[ENC]" + msg.split('').map(ch => {
            if (ch >= 'ا' && ch <= 'ی') {
                let shifted = ch.charCodeAt(0) + 1;
                return shifted <= 1740 ? String.fromCharCode(shifted) : 'ا';
            }
            return ch;
        }).join('');
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${userToken}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ body: encrypted })
            });
            if (res.ok) {
                document.getElementById("messageInput").value = "";
                addLog(`✅ پیام ارسال شد: ${msg.substring(0,30)}`, "success");
                loadMessages();
            } else {
                const err = await res.json();
                addLog(`❌ خطا در ارسال پیام: ${err.message}`, "error");
                alert("خطا: " + (err.message || "توکن نامعتبر"));
                userToken = "";
            }
        } catch(e) {
            addLog(`❌ خطا در ارتباط با سرور هنگام ارسال پیام: ${e.message}`, "error");
            alert("خطا در ارتباط با سرور");
        }
    }
</script>
</body>
</html>
