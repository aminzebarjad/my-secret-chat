<!DOCTYPE html>
<html dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست ساده توکن</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        button { background: #1f6eeb; border: none; padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; margin: 5px; }
        pre { background: #161b22; padding: 12px; border-radius: 8px; overflow-x: auto; }
        .box { background: #2d333b; padding: 12px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<h2>🔧 تست ساده توکن (بدون چت روم و بدون رمز)</h2>

<button id="getTokenBtn">🔑 دریافت توکن خودکار</button>
<button id="testTokenBtn">🔍 تست توکن ذخیره‌شده</button>

<div class="box">
    <strong>📋 نتیجه:</strong>
    <pre id="result">منتظر اقدام شما...</pre>
</div>

<div class="box">
    <strong>🔑 توکن ذخیره‌شده در حافظه:</strong>
    <pre id="storedToken">ندارد</pre>
</div>

<script>
    // ---------- تنظیمات (این دو خط با Secrets جایگزین می‌شوند) ----------
    const REPO_OWNER = "aminzebarjad";
    const REPO_NAME = "my-secret-chat";
    const CHAT_PASSWORD = "12345";   // این هماهنگ با secrets.CHAT_PASSWORD
    const ADMIN_TOKEN = "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";        // این هماهنگ با secrets.ADMIN_TOKEN
    // -----------------------------------------------------------------

    let currentToken = "";

    function log(msg) {
        document.getElementById("result").innerText = msg;
        console.log(msg);
    }

    async function requestAutoToken() {
        log("🔄 در حال ارسال درخواست به اکشن...");
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/issue-token.yml/dispatches`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${ADMIN_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    ref: "main",
                    inputs: { password: CHAT_PASSWORD, session_id: "simple_test_" + Date.now() }
                })
            });
            if (res.ok) {
                log("✅ اکشن فراخوانی شد. برای دریافت توکن دکمه «تست توکن» را بزنید (بعد از چند ثانیه).");
            } else {
                let err = "";
                try { const e = await res.json(); err = e.message; } catch(e) { err = await res.text(); }
                log(`❌ خطا در فراخوانی اکشن: ${res.status} - ${err}`);
            }
        } catch(e) {
            log(`❌ خطا: ${e.message}`);
        }
    }

    async function testStoredToken() {
        if (!currentToken) {
            // تلاش برای خواندن آخرین کامنت Issue
            log("🔄 توکنی در حافظه نیست. در حال جستجو در Issue...");
            try {
                const commentsRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/1/comments`, {
                    headers: { "Accept": "application/vnd.github.v3+json" }
                });
                const comments = await commentsRes.json();
                const latest = comments.reverse().find(c => c.body && c.body.startsWith("🔑 TOKEN_RESULT_"));
                if (latest) {
                    const token = latest.body.split(": ")[1];
                    if (token && token.startsWith("ghs_")) {
                        currentToken = token;
                        document.getElementById("storedToken").innerText = currentToken;
                        log("✅ توکن از Issue دریافت شد. اکنون می‌توانید اعتبار آن را تست کنید.");
                    } else {
                        log("❌ توکن معتبری در Issue یافت نشد.");
                    }
                } else {
                    log("❌ هیچ توکنی در Issue یافت نشد. ابتدا دکمه «دریافت توکن خودکار» را بزنید.");
                }
            } catch(e) {
                log(`❌ خطا در خواندن Issue: ${e.message}`);
            }
            return;
        }

        // تست اعتبار توکن ذخیره‌شده
        log("🔍 در حال تست اعتبار توکن...");
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/1/comments?per_page=1`, {
                headers: { "Authorization": `Bearer ${currentToken}`, "Accept": "application/vnd.github.v3+json" }
            });
            if (res.ok) {
                log(`✅ توکن معتبر است (وضعیت ${res.status})`);
            } else {
                log(`❌ توکن نامعتبر: ${res.status}`);
                if (res.status === 401) currentToken = "";
            }
        } catch(e) {
            log(`❌ خطا: ${e.message}`);
        }
    }

    document.getElementById("getTokenBtn").onclick = () => requestAutoToken();
    document.getElementById("testTokenBtn").onclick = () => testStoredToken();

    // نمایش مقدار ADMIN_TOKEN در صفحه (برای دیباگ)
    console.log("ADMIN_TOKEN from placeholder:", ADMIN_TOKEN);
    if (ADMIN_TOKEN === "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") {
        console.warn("⚠️ ADMIN_TOKEN هنوز جایگزین نشده است!");
        document.getElementById("result").innerText = "⚠️ ADMIN_TOKEN جایگزین نشده. ابتدا اکشن build-index.yml را اجرا کنید.";
    }
</script>
</body>
</html>
