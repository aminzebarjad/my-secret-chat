name: Build simple test HTML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show secret length (just to check)
        run: |
          echo "ADMIN_TOKEN length: ${#ADMIN_TOKEN}"
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Replace with Python (safe)
        run: |
          python3 -c "
          import os
          with open('index.template.html', 'r') as f:
              content = f.read()
          content = content.replace('{{ADMIN_TOKEN}}', os.environ['ADMIN_TOKEN'])
          with open('index.html', 'w') as f:
              f.write(content)
          print('✅ Done')
          "
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Show result (first 30 lines)
        run: |
          echo "=== First 30 lines of index.html ==="
          head -30 index.html
          echo "=== Looking for ADMIN_TOKEN line ==="
          grep -n "ADMIN_TOKEN" index.html || echo "No ADMIN_TOKEN line found (maybe replaced)"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update test [skip ci]"
          git push
