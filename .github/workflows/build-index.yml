name: Build index.html from template

on:
  push:
    branches:
      - main
    paths:
      - 'index.template.html'
      - '.github/workflows/build-index.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show secrets lengths and preview
        run: |
          echo "CHAT_PASSWORD length: ${#CHAT_PASSWORD}"
          echo "ADMIN_TOKEN length: ${#ADMIN_TOKEN}"
          echo "CHAT_PASSWORD first 10 chars: ${CHAT_PASSWORD:0:10}"
          echo "ADMIN_TOKEN first 10 chars: ${ADMIN_TOKEN:0:10}"
        env:
          CHAT_PASSWORD: ${{ secrets.CHAT_PASSWORD }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Replace placeholders with secrets using Python
        run: |
          python3 -c "
          import os
          # خواندن فایل قالب
          with open('index.template.html', 'r', encoding='utf-8') as f:
              content = f.read()
          # جایگزینی مستقیم (بدون مشکل کاراکترهای خاص)
          content = content.replace('{{CHAT_PASSWORD}}', os.environ['CHAT_PASSWORD'])
          content = content.replace('{{ADMIN_TOKEN}}', os.environ['ADMIN_TOKEN'])
          # نوشتن فایل نهایی
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('✅ جایگزینی با موفقیت انجام شد')
          "
        env:
          CHAT_PASSWORD: ${{ secrets.CHAT_PASSWORD }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Verify replacement
        run: |
          echo "=== بررسی وجود placeholderهای باقی‌مانده ==="
          if grep -q "{{" index.html; then
            echo "❌ هنوز placeholder وجود دارد:"
            grep -n "{{" index.html
            exit 1
          else
            echo "✅ هیچ placeholder باقی نمانده است"
          fi
          echo "=== خطوط حاوی ADMIN_TOKEN در index.html ==="
          grep -n "ADMIN_TOKEN" index.html || echo "⚠️ رشته 'ADMIN_TOKEN' در فایل یافت نشد (طبیعی است چون جایگزین شده)"

      - name: Commit and push generated index.html
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update index.html from template [skip ci]"
          git push
